# Pre-commit hooks for cortex-agent.
# Install once:  pip install pre-commit && pre-commit install
# Run on all files:  pre-commit run --all-files
minimum_pre_commit_version: "3.5.0"

repos:
  # --- Ruff: lint (with autofix) + formatter --------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        name: ruff (lint + fix)
        args: ["--fix"]
      - id: ruff-format
        name: ruff (format)

  # --- Standard hygiene hooks -----------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # Helm templates are Go-templated YAML, not valid plain YAML.
        exclude: ^deploy/helm/.*/templates/.*$
      - id: check-added-large-files
        # Block accidentally committing model checkpoints (>25 MB).
        args: ["--maxkb=25600"]
      - id: check-merge-conflict
      - id: detect-private-key
