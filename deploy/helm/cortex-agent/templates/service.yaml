apiVersion: v1
kind: Service
metadata:
  name: {{ include "cortex-agent.fullname" . }}
  labels:
    {{- include "cortex-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "cortex-agent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http
