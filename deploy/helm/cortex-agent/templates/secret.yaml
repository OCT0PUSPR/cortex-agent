{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cortex-agent.secretName" . }}
  labels:
    {{- include "cortex-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  HF_TOKEN: {{ .Values.secrets.hfToken | quote }}
  CORTEX_JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  CORTEX_DATABASE_URL: {{ printf "postgresql+asyncpg://%s:%s@%s:%v/%s" .Values.postgres.user .Values.secrets.postgresPassword .Values.postgres.host .Values.postgres.port .Values.postgres.database | quote }}
  CORTEX_SYNC_DATABASE_URL: {{ printf "postgresql+psycopg://%s:%s@%s:%v/%s" .Values.postgres.user .Values.secrets.postgresPassword .Values.postgres.host .Values.postgres.port .Values.postgres.database | quote }}
  CORTEX_REDIS_URL: {{ .Values.redis.url | quote }}
{{- end }}
