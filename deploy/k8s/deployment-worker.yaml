apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex-worker
  namespace: cortex
  labels:
    app.kubernetes.io/name: cortex-agent
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: cortex-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cortex-agent
      app.kubernetes.io/component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cortex-agent
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: cortex-agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: worker
          image: cortex-agent:latest
          imagePullPolicy: IfNotPresent
          command: ["arq", "cortex.worker.worker_settings.WorkerSettings"]
          envFrom:
            - configMapRef:
                name: cortex-config
            - secretRef:
                name: cortex-secret
          # The arq worker exposes no HTTP port; verify the process is alive
          # with a simple exec probe.
          livenessProbe:
            exec:
              command: ["sh", "-c", "pgrep -f cortex.worker.worker_settings.WorkerSettings"]
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
