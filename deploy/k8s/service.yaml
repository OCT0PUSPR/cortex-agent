apiVersion: v1
kind: Service
metadata:
  name: cortex-api
  namespace: cortex
  labels:
    app.kubernetes.io/name: cortex-agent
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cortex-agent
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cortex-agent
    app.kubernetes.io/component: api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
