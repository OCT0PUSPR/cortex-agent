apiVersion: v1
kind: Secret
metadata:
  name: cortex-secret
  namespace: cortex
  labels:
    app.kubernetes.io/name: cortex-agent
    app.kubernetes.io/part-of: cortex-agent
type: Opaque
# =============================================================================
# TEMPLATE ONLY — DO NOT COMMIT WITH REAL VALUES.
#
# Copy this file to secret.yaml (which is gitignored), replace every
# PLACEHOLDER below with a real value, then apply it:
#
#   cp secret.example.yaml secret.yaml
#   # edit secret.yaml ...
#   kubectl apply -f secret.yaml
#
# Or create it imperatively without ever writing secrets to disk:
#
#   kubectl create secret generic cortex-secret -n cortex \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-... \
#     --from-literal=CORTEX_JWT_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=CORTEX_DATABASE_URL=postgresql+asyncpg://cortex:PASS@postgres:5432/cortex \
#     --from-literal=CORTEX_SYNC_DATABASE_URL=postgresql+psycopg://cortex:PASS@postgres:5432/cortex \
#     --from-literal=CORTEX_REDIS_URL=redis://redis:6379
#
# Generate a strong JWT secret with:  openssl rand -hex 32
# =============================================================================
stringData:
  # -- LLM API keys --------------------------------------------------------
  ANTHROPIC_API_KEY: "PLACEHOLDER_ANTHROPIC_API_KEY"
  HF_TOKEN: "PLACEHOLDER_HF_TOKEN"

  # -- JWT signing secret (HS256) — MUST be overridden in production --------
  CORTEX_JWT_SECRET: "PLACEHOLDER_CHANGE_ME_openssl_rand_hex_32"

  # -- Database password (kept here so the URLs below stay credential-free
  #    in any non-secret manifest). The full URLs are also provided so the
  #    app and Alembic can consume them directly. -------------------------
  POSTGRES_PASSWORD: "PLACEHOLDER_DB_PASSWORD"

  # -- Connection URLs (embed the DB password / Redis host) ----------------
  # async URL used by the app, sync URL used by `alembic upgrade head`.
  CORTEX_DATABASE_URL: "postgresql+asyncpg://cortex:PLACEHOLDER_DB_PASSWORD@postgres:5432/cortex"
  CORTEX_SYNC_DATABASE_URL: "postgresql+psycopg://cortex:PLACEHOLDER_DB_PASSWORD@postgres:5432/cortex"
  CORTEX_REDIS_URL: "redis://redis:6379"
