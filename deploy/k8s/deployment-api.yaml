apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex-api
  namespace: cortex
  labels:
    app.kubernetes.io/name: cortex-agent
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cortex-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cortex-agent
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cortex-agent
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: cortex-agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      # initContainer runs Alembic migrations before any API pod serves traffic.
      # It uses the sync DB URL (CORTEX_SYNC_DATABASE_URL, postgresql+psycopg).
      initContainers:
        - name: migrate
          image: cortex-agent:latest
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: cortex-config
            - secretRef:
                name: cortex-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      containers:
        - name: api
          image: cortex-agent:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "cortex.api.server:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: cortex-config
            - secretRef:
                name: cortex-secret
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
